spring:
  application:
    name: user-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: ${spring.profiles.active:dev}
        group: DEFAULT_GROUP
      config:
        server-addr: localhost:8848
        file-extension: yml
        namespace: ${spring.profiles.active:dev}
        group: DEFAULT_GROUP
        shared-configs:
          - data-id: common-config.yml
            group: DEFAULT_GROUP
            refresh: true
