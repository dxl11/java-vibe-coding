server:
  port: 8086

spring:
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/vibe_ecommerce?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20

# RocketMQ 配置
rocketmq:
  name-server: localhost:9876
  consumer:
    group: coupon-consumer-group

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Dubbo 配置
dubbo:
  application:
    name: coupon-service
  registry:
    address: nacos://localhost:8848
    namespace: ${spring.profiles.active:dev}
  protocol:
    name: dubbo
    port: 20886

# 日志配置
logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.vibe: DEBUG

# 性能监控配置
vibe:
  monitor:
    performance:
      enabled: true
      default-threshold: 2000
      record-all: false
