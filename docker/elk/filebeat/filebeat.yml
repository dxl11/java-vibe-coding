filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /var/log/vibe-ecommerce/**/*-json.log
      - /var/log/vibe-ecommerce/**/*-error-json.log
      - /var/log/vibe-ecommerce/**/*-business-json.log
    fields:
      log_type: application
      environment: ${ENVIRONMENT:-dev}
    fields_under_root: false
    json.keys_under_root: true
    json.add_error_key: true
    multiline.pattern: '^\d{4}-\d{2}-\d{2}'
    multiline.negate: true
    multiline.match: after

  - type: log
    enabled: true
    paths:
      - /var/log/vibe-ecommerce/**/*.log
    exclude_files: ['*-json.log']
    fields:
      log_type: text
      environment: ${ENVIRONMENT:-dev}
    fields_under_root: false

processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_docker_metadata: ~

output.logstash:
  hosts: ["logstash:5044"]

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644
