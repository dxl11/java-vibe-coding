input {
  # 从 Filebeat 接收日志
  beats {
    port => 5044
  }
  
  # 也可以直接从文件读取（备用方案）
  file {
    path => "/var/log/vibe-ecommerce/**/*-json.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
    type => "application-log"
  }
}

filter {
  # 解析 JSON 格式日志
  if [type] == "application-log" or [fields][log_type] {
    json {
      source => "message"
    }
  }
  
  # 提取服务名称
  if [service] {
    mutate {
      add_field => { "[@metadata][service]" => "%{service}" }
    }
  } else if [fields][service] {
    mutate {
      add_field => { "[@metadata][service]" => "%{[fields][service]}" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][service]" => "unknown" }
    }
  }
  
  # 提取日志类型
  if [logType] {
    mutate {
      add_field => { "[@metadata][log_type]" => "%{logType}" }
    }
  } else if [fields][log_type] {
    mutate {
      add_field => { "[@metadata][log_type]" => "%{[fields][log_type]}" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][log_type]" => "application" }
    }
  }
  
  # 处理时间戳
  if [timestamp] {
    date {
      match => [ "timestamp", "yyyy-MM-dd'T'HH:mm:ss.SSSZ", "yyyy-MM-dd HH:mm:ss.SSS" ]
      target => "@timestamp"
    }
  }
  
  # 提取 TraceId（如果存在）
  if [traceId] {
    mutate {
      add_field => { "[@metadata][trace_id]" => "%{traceId}" }
    }
  } else if [mdc][traceId] {
    mutate {
      add_field => { "[@metadata][trace_id]" => "%{[mdc][traceId]}" }
    }
  }
  
  # 提取用户ID（如果存在）
  if [userId] {
    mutate {
      add_field => { "[@metadata][user_id]" => "%{userId}" }
    }
  } else if [mdc][userId] {
    mutate {
      add_field => { "[@metadata][user_id]" => "%{[mdc][userId]}" }
    }
  }
  
  # 提取 IP 地址（如果存在）
  if [ip] {
    mutate {
      add_field => { "[@metadata][ip]" => "%{ip}" }
    }
  } else if [mdc][ip] {
    mutate {
      add_field => { "[@metadata][ip]" => "%{[mdc][ip]}" }
    }
  }
  
  # 解析业务日志中的结构化字段
  if [message] =~ /OPERATION:/ {
    grok {
      match => { 
        "message" => "OPERATION:%{DATA:operation}\|MESSAGE:%{DATA:log_message}\|PARAMS:%{DATA:params}\|TRACE_ID:%{DATA:trace_id}\|USER_ID:%{DATA:user_id}\|IP:%{DATA:client_ip}" 
      }
    }
  }
  
  # 解析审计日志中的结构化字段
  if [message] =~ /OPERATION:.*\|RESOURCE:/ {
    grok {
      match => { 
        "message" => "OPERATION:%{DATA:operation}\|RESOURCE:%{DATA:resource}\|RESOURCE_ID:%{DATA:resource_id}\|ACTION:%{DATA:action}\|RESULT:%{DATA:result}\|USER_ID:%{DATA:user_id}\|IP:%{DATA:client_ip}\|TRACE_ID:%{DATA:trace_id}\|REMARK:%{GREEDYDATA:remark}" 
      }
    }
  }
  
  # 解析错误日志
  if [level] == "ERROR" {
    mutate {
      add_field => { "[@metadata][log_type]" => "error" }
    }
  }
  
  # 添加环境信息
  mutate {
    add_field => { "environment" => "%{[fields][environment]}" }
    add_field => { "host" => "%{[host][name]}" }
  }
}

output {
  # 根据服务名和日期创建索引
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "vibe-logs-%{[@metadata][service]}-%{[@metadata][log_type]}-%{+YYYY.MM.dd}"
    template_name => "vibe-logs-template"
    template => "/usr/share/logstash/templates/log-template.json"
    template_overwrite => true
  }
  
  # 开发环境可以同时输出到控制台（调试用）
  if [environment] == "dev" {
    stdout {
      codec => rubydebug
    }
  }
}
