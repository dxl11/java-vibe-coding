server:
  port: 8083

spring:
  profiles:
    active: dev
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/vibe_ecommerce?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=2000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Seata 配置
seata:
  enabled: true
  application-id: order-service
  tx-service-group: default_tx_group
  config:
    type: nacos
    nacos:
      server-addr: localhost:8848
      namespace: ${spring.profiles.active:dev}
      group: SEATA_GROUP
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: localhost:8848
      namespace: ${spring.profiles.active:dev}
      group: SEATA_GROUP

# Dubbo 配置
dubbo:
  application:
    name: order-service
  registry:
    address: nacos://localhost:8848
    namespace: ${spring.profiles.active:dev}
  protocol:
    name: dubbo
    port: 20883

# RocketMQ 配置
rocketmq:
  name-server: localhost:9876
  producer:
    group: order-producer-group

# 日志配置
logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.vibe: DEBUG

# 性能监控配置
vibe:
  monitor:
    performance:
      enabled: true
      default-threshold: 2000
      record-all: false
  
  # SAGA 配置
  saga:
    default-timeout-seconds: 300
    retry:
      max-retry-count: 3
      initial-interval-ms: 1000
      max-interval-ms: 60000
      multiplier: 2.0
    circuit-breaker:
      enabled: true
      failure-rate-threshold: 50.0
      minimum-number-of-calls: 10
      time-window-seconds: 60
      permitted-number-of-calls-in-half-open-state: 3
    metrics:
      enabled: true
      collect-interval-seconds: 60
    alert:
      enabled: true
      failure-rate-threshold: 10.0
      timeout-transaction-threshold: 10
      compensation-failure-threshold: 5
    recovery:
      auto-recovery-enabled: true
      auto-recovery-interval-seconds: 300
      max-recovery-count: 3
